name: "Core"

on:
  workflow_call:
    inputs:
      tasklist-filepath:
        required: false
        type: "string"
      is-release:
        required: true
        type: "boolean"
        default: false

jobs:
  job-init:
    name: "Init"
    runs-on: "ubuntu-latest"
    outputs:
      result: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - id: "set-matrix"
        run: |
          echo "matrix="`cat ${{ inputs.tasklist-filepath }} `"">> $GITHUB_OUTPUT

  job-patch:
    needs: "job-init"
    runs-on: "ubuntu-latest"
    continue-on-error: true
    strategy:
      matrix: ${{ fromJSON(needs.job-init.outputs.result) }}
    name: "Repacking ${{ matrix.nickname }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup JDK"
        uses: "actions/setup-java@v4"
        with:
          java-version: "21"
          java-package: "jdk"
          distribution: "liberica"

      - name: "Download Apk (from APKMirror)"
        if: ${{ matrix.type == 'apkmirror' }}
        uses: "Kingsman44/gh-apkmirror-dl@v2.0"
        with:
          org: '${{ matrix.data.org }}'
          repo: '${{ matrix.data.repo }}'
          version: '${{ matrix.data.version }}'
          filename: 'temp.apk'

      - name: "Download Apk (from WanDouJia)"
        if: ${{ matrix.type == 'wandoujia' }}
        run: |
          # 点我展开
          if [[ ${{matrix.data.history_id_num == '' }} ]]; then
            url=`curl -I 'https://www.wandoujia.com/apps/${{matrix.data.app_id_num}}/download/dot?ch=detail_normal_dl' \
              -H 'authority: www.wandoujia.com' \
              -H 'referer: https://www.wandoujia.com/apps/${{matrix.data.app_id_num}}' \
              | grep "location:" |  sed 's#location: ##'`
          else
            url=`curl -s "https://www.wandoujia.com/apps/${{matrix.data.app_id_num}}/history_v${{matrix.data.history_id_num}}" \
              | grep "data-href" | head -n1 | awk '$1=$1'|  sed -e 's/.*href="\(.*\)\" .*/\1/'`
          fi
          wget -O "temp.apk" $url

      - name: "Download Apk (from Direct)"
        if: ${{ matrix.type == 'direct' }}
        run: |
          # 点我展开
          echo "文件来源 ${{ matrix.data.name }}"
          case "${{ matrix.data.name }}" in
            vivo) dl_url="https://appstore.vivo.com.cn/appinfo/downloadApkFile-h5appstore?id=${{ matrix.data.value }}" ;;
            apkpure) dl_url="https://d.apkpure.com/b/APK/${{ matrix.data.value }}?version=${{ matrix.data.version }}" ;;
            *) dl_url="${{ matrix.data.value }}" ;;
          esac
          aria2c --out "temp.apk" $dl_url

      - name: "Get Apk Info"
        id: "apk-info"
        uses: "8Mi-Tech/get-apk-info-action@master"
        with:
          apkPath: "temp.apk"
        # 版本号：${{steps.apk-info.outputs.versionNum}}

      - name: "Install Artifact Handle"
        uses: "lhotari/gh-actions-artifact-client@v2"

      - name: "Patch LSPatch Lib to Apk (include fork)"
        run: |
          # 点我展开
          new_filename="${{ matrix.nickname }}-${{ steps.apk-info.outputs.versionNum }}"
          cp temp.apk $new_filename.apk

          make_lspatch_apk() {
            echo "::group:: 点我展开 当前步骤为通过 $1 打包"
            java -jar $1.jar -v --manager -l 2 -o "$1" $new_filename.apk
            (
              cd $1
              mv -v $(ls) $new_filename-$1.apk
              zip -q - "$(ls)" | gh-actions-artifact-client.js upload "$(ls)"
            )
            echo "::endgroup::"
          }

          make_lspatch_apk lspatch
          make_lspatch_apk jm-lspatch
          make_lspatch_apk npatch

  job_release:
    needs: "job-patch"
    if: ${{ inputs.is-release }}
    name: "Release All"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Download all APKs"
        uses: "actions/download-artifact@v8"
        with:
          path: "apks/"
          merge-multiple: true

      - name: "List folder APKs files"
        run: |
          # 点击展开
          ls -R apks || true

      # 关键改动：每次生成唯一 tag（编译时间 + 短 SHA）
      - name: "Compute Release Tag"
        id: rel
        run: |
          set -eu
          TS_UTC="$(date -u +'%Y%m%d-%H%M%SZ')"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="apks-${TS_UTC}-${SHORT_SHA}"
          echo "ts_utc=$TS_UTC" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: "Write release note"
        run: |
          cat > release.txt << EOF
          该 CI 构建时间（上海时区）: $(TZ=Asia/Shanghai date +"%Y.%m.%d %H:%M:%S")
          该 CI 构建时间（UTC）: $(date -u +"%Y.%m.%d %H:%M:%S")
          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          管理器已展示在 README.md 内，请自行下载对应的管理器
          EOF

      # 关键改动：不再 delete old assets、不再 update 固定 tag、不再 prerelease
      - name: "Create Release (keep history)"
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: "Auto Build ${{ steps.rel.outputs.ts_utc }}"
          body_path: "release.txt"
          files: |
            apks/*
          draft: false
          prerelease: false
          generate_release_notes: false
          target_commitish: ${{ github.sha }}
